# =============================================================================
# SABLE - Spring Boot Application Configuration
# =============================================================================
# This file configures the application name, server port, database connection,
# and JPA/Hibernate behavior. Environment-specific values can override these.
# =============================================================================

spring.application.name=SABLE

# -----------------------------------------------------------------------------
# Server Configuration
# -----------------------------------------------------------------------------
# Binds the embedded Tomcat server to port 8081. All REST endpoints will be
# available at http://localhost:8081
server.port=8081

# -----------------------------------------------------------------------------
# MySQL Data Source
# -----------------------------------------------------------------------------
# JDBC URL: connects to MySQL on localhost, port 3306, database name 'sable_db'.
# Ensure MySQL is running and the database 'sable_db' exists (or let Hibernate
# create it if your user has permissions).
spring.datasource.url=jdbc:mysql://localhost:3306/sable_db
spring.datasource.username=root
spring.datasource.password=root
# Optional: use MySQL driver explicitly (usually auto-detected)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# -----------------------------------------------------------------------------
# JPA / Hibernate Configuration
# -----------------------------------------------------------------------------
# ddl-auto=update: Hibernate updates the database schema (add columns, tables)
# on startup. It does NOT drop existing tables. Use 'create-drop' only for
# tests; use 'validate' or 'none' in production for safety.
spring.jpa.hibernate.ddl-auto=update

# show-sql=true: Logs SQL statements to the console. Useful for development.
# Set to false in production to reduce log noise and avoid exposing queries.
spring.jpa.show-sql=true

# Optional: format SQL for readability in logs
spring.jpa.properties.hibernate.format_sql=true

# Use MySQL dialect so Hibernate generates correct SQL for MySQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
