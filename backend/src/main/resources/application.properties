# =============================================================================
# SABLE - Spring Boot Application Configuration
# =============================================================================
# This file configures the application name, server port, database connection,
# and JPA/Hibernate behavior. Environment-specific values can override these.
# =============================================================================

spring.application.name=SABLE

# -----------------------------------------------------------------------------
# Server Configuration
# -----------------------------------------------------------------------------
# Binds the embedded Tomcat server to port 8081. All REST endpoints will be
# available at http://localhost:8081
server.port=8081

# -----------------------------------------------------------------------------
# MySQL Data Source
# -----------------------------------------------------------------------------
# JDBC URL: connects to MySQL on localhost, port 3306, database name 'sable_db'.
# Ensure MySQL is running and the database 'sable_db' exists (or let Hibernate
# create it if your user has permissions).
multinode.datasource.enabled=true

multinode.datasource.primary.url=jdbc:mysql://localhost:3306/sable_db
multinode.datasource.primary.username=root
multinode.datasource.primary.password=pict123

multinode.datasource.replicas[0].url=jdbc:mysql://localhost:3307/sable_db
multinode.datasource.replicas[0].username=root
multinode.datasource.replicas[0].password=root

# multinode.datasource.replicas[1].url=jdbc:mysql://localhost:3308/sable_db
# multinode.datasource.replicas[1].username=root
# multinode.datasource.replicas[1].password=...

# Optional: use MySQL driver explicitly (usually auto-detected)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# -----------------------------------------------------------------------------
# JPA / Hibernate Configuration
# -----------------------------------------------------------------------------
# ddl-auto=update: Hibernate updates the database schema (add columns, tables)
# on startup. It does NOT drop existing tables. Use 'create-drop' only for
# tests; use 'validate' or 'none' in production for safety.
spring.jpa.hibernate.ddl-auto=update

# show-sql=true: Logs SQL statements to the console. Useful for development.
# Set to false in production to reduce log noise and avoid exposing queries.
spring.jpa.show-sql=true

# Optional: format SQL for readability in logs
spring.jpa.properties.hibernate.format_sql=true

# Use MySQL dialect so Hibernate generates correct SQL for MySQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# -----------------------------------------------------------------------------
# JWT Configuration
# -----------------------------------------------------------------------------
# Secret key: must be at least 32 characters for HS256. Change this in production
# and load from an environment variable, never commit the real secret to git.
jwt.secret=d3a5304f373a316b524d12ef0824878e8cc837b823c4ddcb4ba9fc51d4616a7319e140b1a430ad959642858f4647239e1fb5dcfdd156c84d1c57134392de997a
# Token validity: 86400000 ms = 24 hours
jwt.expiration-ms=86400000
